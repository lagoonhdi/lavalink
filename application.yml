server:
  port: ${PORT:2333}
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false

  server:
    password: ${LAVALINK_PASSWORD:youshallnotpass}

    bufferDurationMs: 400
    frameBufferDurationMs: 3000
    opusEncodingQuality: 5
    resamplingQuality: LOW

    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      http: true
      local: false
      twitch: false
      vimeo: false
      nico: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - WEBEMBEDDED

logging:
  level:
    root: WARN
    lavalink: INFO
    lavalink.server.io.RequestLoggingFilter: WARN
    com.sedmelluq.discord.lavaplayer: WARN
    dev.lavalink.youtube: WARN

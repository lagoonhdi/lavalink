server:
  port: ${PORT:2333}
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false

  server:
    password: ${LAVALINK_PASSWORD:youshallnotpass}

    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      http: true
      local: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    oauth:
      enabled: true
      refreshToken: "${YOUTUBE_REFRESH_TOKEN}"

    remoteCipher:
      url: "https://cipher.kikkia.dev/"
      userAgent: "liam-delap-bot"

    clients:
      - MUSIC
      - TV
      - WEB
      - WEBEMBEDDED
      - ANDROID_VR
      - TVHTML5_SIMPLY

logging:
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube.http.YoutubeOauth2Handler: INFO
